<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Game - Pro Edition</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./image/icon2.png">

    <link rel="shortcut icon" href="./image/icon2.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/sweetalert2.min.css">
    <link rel="stylesheet" href="./css/all.min.css">
    <link rel="stylesheet" href="./css/style.css">

    <script>
        // تسجيل الـ Service Worker لجعل التطبيق يعمل بدون إنترنت
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA: Service Worker Registered!'))
                    .catch(err => console.log('PWA: Service Worker Failed', err));
            });
        }
    </script>
</head>
<body>
    <div class="control-buttons">
        <span>Start Game</span>
    </div>
    
    <div class="info-container">
        <div class="name">Player: <span></span></div>
        <div class="stars-live">⭐⭐⭐⭐⭐</div>
        <div class="timer">Time: <span>05:00</span></div>
        <div class="tries">Errors: <span>0</span></div>
        <div id="hint-btn" title="Get a Hint (-30s)">Hint👁️:</div>
        
        <div id="installApp" class="install-nav-wrapper" style="display: none;">
            <button id="installBtn" class="pwa-install-btn-nav">
                <i class="fas fa-mobile-alt"></i> تثبيت
            </button>
        </div>
    </div>

    <div class="memory-game-blocks">
        <div class="game-block" data-icon="ghost"><div class="face front"></div><div class="face back"><i class="fas fa-ghost"></i></div></div>
        <div class="game-block" data-icon="ghost"><div class="face front"></div><div class="face back"><i class="fas fa-ghost"></i></div></div>
        <div class="game-block" data-icon="rocket"><div class="face front"></div><div class="face back"><i class="fas fa-rocket"></i></div></div>

        <div class="game-block" data-icon="gem"><div class="face front"></div><div class="face back"><i class="fas fa-gem"></i></div></div>
        <div class="game-block" data-icon="plane"><div class="face front"></div><div class="face back"><i class="fas fa-plane"></i></div></div>
        <div class="game-block" data-icon="plane"><div class="face front"></div><div class="face back"><i class="fas fa-plane"></i></div></div>
        <div class="game-block" data-icon="heart"><div class="face front"></div><div class="face back"><i class="fas fa-heart"></i></div></div>
        <div class="game-block" data-icon="heart"><div class="face front"></div><div class="face back"><i class="fas fa-heart"></i></div></div>
        <div class="game-block" data-icon="gift"><div class="face front"></div><div class="face back"><i class="fas fa-gift"></i></div></div>
        <div class="game-block" data-icon="gift"><div class="face front"></div><div class="face back"><i class="fas fa-gift"></i></div></div>
        <div class="game-block" data-icon="tree"><div class="face front"></div><div class="face back"><i class="fas fa-tree"></i></div></div>
        <div class="game-block" data-icon="tree"><div class="face front"></div><div class="face back"><i class="fas fa-tree"></i></div></div>
